capital: 100000
mode: paper            # paper | live  (live also requires AUTOBOT_CONFIRM_LIVE env var)
confidence_threshold: 0.70
risk:
  daily_profit_target: 50      # rupees; user rule example +50
  daily_max_loss: 20           # rupees; user rule example -20 -> net +30 day
  reward_risk_min: 2.5
  max_open_positions: 1
  squareoff_time: "15:15"      # IST hard exit
  theta_timeout_minutes: 45    # exit if sideways (theta bleed)
option:
  min_delta: 0.45              # ATM/slightly ITM only
  risk_free_rate: 0.068
nature:
  pheromone_evaporation: 0.9
  immune_z_threshold: 4.0
news_feeds:
  - https://feeds.reuters.com/reuters/businessNews
  - https://economictimes.indiatimes.com/markets/rssfeeds/1977021501.cms
  - https://www.moneycontrol.com/rss/marketreports.xml
